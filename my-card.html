<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Hammad & Nashra — Hamshra Engagement Card</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  :root {
    --cream: #fdf8f2;
    --forest: #3d6b5e;
    --gold: #d4af37; /* Metallic Gold */
    --dust: #c4a882;
    --sage: #8aad9f;
  }

  /* Reset */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #fafaf5;
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  /* Fixed Simple Rectangle Card Container (Pehle Jaisa Format) */
  .card-container {
    background: var(--cream);
    width: 250px;
    height: 380px;
    border: 1px solid var(--dust);
    box-shadow: 0 10px 40px rgba(0,0,0,0.06);
    text-align: center;
    padding: 30px 20px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border-radius: 8px; /* Subtle corners */
  }

  /* Title Wording - Pehle Jaisi Font aur Size */
  .title-wording {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    color: var(--forest);
    font-weight: 400;
    margin-bottom: 5px;
    margin-top: 5px;
  }

  /* Theme Tagline */
  .tagline {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.65rem;
    color: var(--sage);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 30px;
  }

  /* Simple QR Code Section (Aapne Fix kar Diya!) */
  .qr-section {
    position: relative;
    width: 140px;
    height: 140px;
    margin: 0 auto;
    border: 2px solid var(--dust); /* Simple frame */
    padding: 3px;
    background: #fff;
    border-radius: 6px;
  }
  
  /* Modern QR Center Text Overlay (Gold) */
  .qr-center-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--gold); /* Gold back for center text */
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.6rem;
    padding: 3px 6px;
    border-radius: 4px;
    font-weight: bold;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  /* Text below QR */
  .instruction-text {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.8rem;
    color: var(--forest);
    margin-top: 25px;
    opacity: 0.8;
  }

  /* Bottom Wording (Pehle Jaisa Format) */
  .final-divider {
    width: 30px;
    height: 1px;
    background: var(--dust);
    margin: 15px auto;
  }
  
  .engaged-text {
    font-size: 0.6rem;
    color: var(--sage);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

</style>
</head>
<body>

  <div class="card-container">
    
    <div class="title-wording">Hammad & Nashra</div>
    <div class="tagline">✦ Hamshra ✦</div>

    <div class="qr-section">
      <div class="qr-frame" style="width:100%; height:100%; overflow:hidden;">
        <img src="https://raw.githubusercontent.com/muhammadhammadweb/hamshra-card/main/qr.png" alt="Hamshra QR Code" style="width:100%; height:100%; object-fit: cover; border-radius: 4px;">
      </div>
      <div class="qr-center-text">Hamshra</div>
    </div>

    <p class="instruction-text">Scan to experience our journey.</p>
    <div class="final-divider"></div>
    <p class="engaged-text">ENGAGED • 2026</p>
  </div>

</body>
</html>
