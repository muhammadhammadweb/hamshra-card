<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hammad & Nashra</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #e8e0d5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Jost', sans-serif;
    padding: 24px;
  }

  .card {
    width: 320px;
    background: #fdf9f4;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15), 0 4px 12px rgba(0,0,0,0.08);
    border: 1px solid #e5d9c8;
  }

  /* TOP: Text + QR */
  .card-top {
    padding: 36px 28px 28px;
    text-align: center;
  }

  .engaged-label {
    font-size: 0.58rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: #a08c6e;
    margin-bottom: 16px;
  }

  .names {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.6rem;
    font-weight: 300;
    color: #3a6455;
    line-height: 1;
    margin-bottom: 4px;
  }

  .amp { font-style: italic; color: #c4a882; }

  .combo {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.95rem;
    color: #c4a882;
    letter-spacing: 0.12em;
    margin-bottom: 22px;
  }

  .line {
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #c4a882, transparent);
    margin: 0 auto 22px;
  }

  .tagline {
    font-size: 0.8rem;
    font-weight: 300;
    color: #7a9e90;
    line-height: 1.7;
    letter-spacing: 0.04em;
    margin-bottom: 26px;
  }

  .qr-wrap {
    display: inline-block;
    padding: 10px;
    background: #fff;
    border-radius: 12px;
    border: 1px solid #e5d9c8;
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    margin-bottom: 18px;
  }

  .qr-wrap img {
    display: block;
    width: 120px;
    height: 120px;
    object-fit: contain;
  }

  .scan-text {
    font-size: 0.62rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #a08c6e;
  }

  /* BOTTOM: Photo */
  .card-photo {
    width: 100%;
    height: 200px;
    overflow: hidden;
    position: relative;
  }

  .card-photo::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 40px;
    background: linear-gradient(to bottom, #fdf9f4, transparent);
    z-index: 1;
  }

  .card-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 30%;
    display: block;
  }
</style>
</head>
<body>

<div class="card">

  <div class="card-top">
    <p class="engaged-label">✦ &nbsp; We're Engaged &nbsp; ✦</p>

    <h1 class="names">Hammad <span class="amp">&amp;</span> Nashra</h1>
    <p class="combo">Hamshra • 2026</p>

    <div class="line"></div>

    <p class="tagline">
      Two hearts, one story —<br>six months in the making.
    </p>

    <div class="qr-wrap">
      <img
        src="https://raw.githubusercontent.com/muhammadhammadweb/hamshra-card/main/qr.png"
        alt="Scan QR"
      />
    </div>

    <p class="scan-text">Scan to open our story</p>
  </div>

  <div class="card-photo">
    <img
      src="https://raw.githubusercontent.com/muhammadhammadweb/hamshra-card/main/img3_river.png.png"
      alt="Hammad & Nashra"
    />
  </div>

</div>

</body>
</html>
