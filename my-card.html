<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hammad & Nashra — Hamshra</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
<style>

/* ── RESET ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* ── PAGE ── */
html, body {
  min-height: 100%;
  width: 100%;
  background: #d6cfc4;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Jost', sans-serif;
  padding: 40px 16px;
}

/* ── CARD SHELL ──
   Fixed aspect ratio like a real card: ~2.5 x 3.5 inches = ~400 x 560px
   Scales down on small screens */
.card {
  width: min(400px, 92vw);
  background: #fdf8f2;
  border-radius: 18px;
  overflow: hidden;
  position: relative;
  box-shadow:
    0 0 0 1px rgba(196,168,130,0.25),
    0 8px 24px rgba(0,0,0,0.10),
    0 32px 72px rgba(0,0,0,0.16);
  /* subtle paper texture via gradient */
  background-image:
    radial-gradient(ellipse at 30% 0%, rgba(255,248,235,0.9) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(232,220,200,0.5) 0%, transparent 50%);
}

/* ── INNER BORDER (like a real card) ── */
.card-inner {
  margin: 10px;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid rgba(196,168,130,0.3);
  display: flex;
  flex-direction: column;
}

/* ── TOP SECTION ── */
.card-top {
  padding: 28px 24px 20px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: #fdf8f2;
  position: relative;
}

/* corner ornaments */
.card-top::before,
.card-top::after {
  content: '✦';
  position: absolute;
  font-size: 0.5rem;
  color: rgba(196,168,130,0.5);
}
.card-top::before { top: 12px; left: 14px; }
.card-top::after  { top: 12px; right: 14px; }

/* WE'RE ENGAGED */
.label-top {
  font-size: 0.52rem;
  letter-spacing: 0.38em;
  text-transform: uppercase;
  color: #b89c78;
  margin-bottom: 14px;
  font-weight: 400;
}

/* DECORATIVE LINE DIVIDER */
.ornament {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
  width: 100%;
  justify-content: center;
}
.ornament-line {
  flex: 1;
  max-width: 60px;
  height: 1px;
  background: linear-gradient(90deg, transparent, #c4a882);
}
.ornament-line.right {
  background: linear-gradient(90deg, #c4a882, transparent);
}
.ornament-diamond {
  width: 5px; height: 5px;
  background: #c4a882;
  transform: rotate(45deg);
}

/* NAMES */
.names {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  color: #3a6455;
  text-align: center;
  margin-bottom: 6px;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  line-height: 1.1;
  gap: 0;
}
.names .name-word {
  font-size: clamp(2.2rem, 9vw, 2.8rem);
  line-height: 1.05;
}
.names .amp {
  font-style: italic;
  color: #c4a882;
  font-weight: 300;
  font-size: clamp(1rem, 4vw, 1.3rem);
  line-height: 1.4;
}

/* HAMSHRA */
.hamshra {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1rem;
  color: #c4a882;
  letter-spacing: 0.1em;
  margin-bottom: 16px;
}

/* TAGLINE */
.tagline {
  font-size: 0.72rem;
  font-weight: 300;
  color: #8aad9f;
  line-height: 1.8;
  letter-spacing: 0.06em;
  margin-bottom: 20px;
  text-align: center;
}

/* QR BOX */
.qr-box {
  background: #fff;
  border: 1px solid #e8ddd0;
  border-radius: 12px;
  padding: 11px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  margin-bottom: 12px;
  display: inline-block;
}
.qr-box img {
  display: block;
  width: 110px;
  height: 110px;
  object-fit: contain;
}

/* SCAN TEXT */
.scan-label {
  font-size: 0.52rem;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: #b89c78;
  margin-bottom: 4px;
}

/* ── PHOTO SECTION ── */
.card-photo {
  width: 100%;
  /* tall enough to show the couple fully */
  height: clamp(200px, 48vw, 230px);
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}

/* top fade so photo blends into card */
.card-photo::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    #fdf8f2 0%,
    transparent 28%,
    transparent 70%,
    rgba(60,50,35,0.08) 100%
  );
  z-index: 1;
  pointer-events: none;
}

.card-photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  /* show couple — bottom of image */
  object-position: center bottom;
  display: block;
}

/* YEAR STAMP over photo */
.photo-year {
  position: absolute;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2;
  font-size: 0.5rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.85);
  background: rgba(58,100,85,0.55);
  backdrop-filter: blur(4px);
  padding: 4px 14px;
  border-radius: 100px;
  white-space: nowrap;
}

</style>
</head>
<body>

<div class="card">
  <div class="card-inner">

    <!-- TOP -->
    <div class="card-top">

      <p class="label-top">✦ &nbsp; We're Engaged &nbsp; ✦</p>

      <h1 class="names">
        <span class="name-word">Hammad</span>
        <span class="amp">&amp;</span>
        <span class="name-word">Nashra</span>
      </h1>
      <p class="hamshra">Hamshra · 2026</p>

      <div class="ornament">
        <div class="ornament-line"></div>
        <div class="ornament-diamond"></div>
        <div class="ornament-line right"></div>
      </div>

      <p class="tagline">
        Two hearts, one story —<br>
        six months in the making.
      </p>

      <div class="qr-box">
        <img
          src="https://raw.githubusercontent.com/muhammadhammadweb/hamshra-card/main/qr.png"
          alt="Scan to open our story"
        />
      </div>

      <p class="scan-label">Scan to open our story</p>

    </div>

    <!-- PHOTO -->
    <div class="card-photo">
      <img
        src="https://raw.githubusercontent.com/muhammadhammadweb/hamshra-card/main/img3_river.png.png"
        alt="Hammad & Nashra"
      />
      <div class="photo-year">Engaged • March 2026</div>
    </div>

  </div>
</div>

</body>
</html>
