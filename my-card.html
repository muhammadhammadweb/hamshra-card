<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hammad & Nashra — Hamshra</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
<style>

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* ── PAGE BACKGROUND ── */
html, body {
  min-height: 100%;
  width: 100%;
  background: #cec6b8;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Jost', sans-serif;
  padding: 48px 24px;
}

/* ── CARD
   5×7 inch = 500×700px on screen (100px per inch at 100dpi)
   For print export: 1500×2100px at 300dpi
   We use aspect-ratio to keep it perfect on all screens
── */
.card {
  width: min(500px, 92vw);
  aspect-ratio: 5 / 7;
  background: #fdf8f1;
  border-radius: 16px;
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
  box-shadow:
    0 0 0 1px rgba(180,155,115,0.2),
    0 4px 16px rgba(0,0,0,0.08),
    0 24px 64px rgba(0,0,0,0.18),
    0 48px 100px rgba(0,0,0,0.10);
}

/* ── INNER BORDER (printed card feel) ── */
.card::before {
  content: '';
  position: absolute;
  inset: 10px;
  border: 1px solid rgba(196,168,130,0.28);
  border-radius: 8px;
  z-index: 10;
  pointer-events: none;
}

/* corner marks (like real card trim marks) */
.card::after {
  content: '✦';
  position: absolute;
  top: 18px; left: 50%;
  transform: translateX(-50%);
  font-size: 0.4rem;
  color: rgba(196,168,130,0.45);
  z-index: 11;
  letter-spacing: 0.5em;
}

/* ── TOP SECTION: TEXT AREA ── */
.card-top {
  flex: 0 0 42%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px 36px 12px;
  text-align: center;
  position: relative;
  z-index: 2;
  background: #fdf8f1;
}

/* WE'RE ENGAGED */
.engaged-label {
  font-size: 0.5rem;
  letter-spacing: 0.42em;
  text-transform: uppercase;
  color: #b89a6e;
  margin-bottom: 12px;
  font-weight: 400;
  display: flex;
  align-items: center;
  gap: 10px;
}
.engaged-label::before,
.engaged-label::after {
  content: '';
  display: block;
  width: 20px;
  height: 1px;
  background: #c4a882;
}

/* NAMES */
.names {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  color: #3a6455;
  display: flex;
  flex-direction: row;
  align-items: baseline;
  justify-content: center;
  gap: 10px;
  margin-bottom: 10px;
  line-height: 1;
  flex-wrap: nowrap;
}
.name-word {
  font-size: clamp(1.8rem, 7vw, 2.4rem);
  line-height: 1.05;
  letter-spacing: 0.02em;
}
.amp {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  color: #c4a882;
  font-size: clamp(0.9rem, 3vw, 1.1rem);
  line-height: 1;
}

/* HAMSHRA */
.hamshra {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: clamp(1.3rem, 2.2vw, 0.95rem);
  color: #c4a882;
  letter-spacing: 0.12em;
  margin-bottom: 12px;
}

/* DIAMOND DIVIDER */
.divider {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
  width: 100%;
  justify-content: center;
}
.div-line {
  height: 1px;
  width: 52px;
  background: linear-gradient(90deg, transparent, #c4a882);
}
.div-line.r { background: linear-gradient(90deg, #c4a882, transparent); }
.div-diamond {
  width: 5px; height: 5px;
  background: #c4a882;
  transform: rotate(45deg);
  flex-shrink: 0;
}

/* TAGLINE */
.tagline {
  font-size: clamp(1.1rem, 1.8vw, 0.74rem);
  font-weight: 300;
  color: #8aad9f;
  line-height: 1.8;
  letter-spacing: 0.07em;
  margin-bottom: 14px;
}

/* QR */
.qr-wrap {
  background: #fff;
  border: 1px solid #e4d8c8;
  border-radius: 10px;
  padding: 8px;
  box-shadow: 0 2px 14px rgba(0,0,0,0.07);
  margin-bottom: 8px;
}
.qr-wrap img {
  display: block;
  width: clamp(72px, 16vw, 88px);
  height: clamp(72px, 16vw, 88px);
  object-fit: contain;
}

/* SCAN LABEL */
.scan-label {
  font-size: 0.5rem;
  letter-spacing: 0.36em;
  text-transform: uppercase;
  color: #b89a6e;
}

/* ── BOTTOM: PHOTO ── */
.card-photo {
  flex: 0 0 58%;
  position: relative;
  overflow: hidden;
}

/* seamless blend from card-top into photo */
.card-photo::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 55%;
  background: linear-gradient(to bottom, #fdf8f1 0%, rgba(253,248,241,0) 100%);
  z-index: 2;
  pointer-events: none;
}

/* subtle vignette bottom */
.card-photo::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 30%;
  background: linear-gradient(to top, rgba(40,30,20,0.12), transparent);
  z-index: 2;
  pointer-events: none;
}

.card-photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center 65%;
  display: block;
}

/* YEAR PILL */
.year-pill {
  position: absolute;
  bottom: 14px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 5;
  font-size: 0.48rem;
  letter-spacing: 0.38em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.92);
  background: rgba(58,100,85,0.52);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  padding: 5px 16px;
  border-radius: 100px;
  white-space: nowrap;
  border: 1px solid rgba(255,255,255,0.15);
}

/* ── PRINT BUTTON ── */
.print-bar {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 999;
  display: flex;
  align-items: center;
  gap: 10px;
  background: #3a6455;
  color: #fdf8f2;
  padding: 13px 26px;
  border-radius: 100px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.22);
  font-family: 'Jost', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  cursor: pointer;
  border: none;
  white-space: nowrap;
  transition: background 0.2s, transform 0.2s;
}
.print-bar:hover { background: #2c5044; transform: translateX(-50%) translateY(-2px); }

/* ── PRINT STYLES ── */
@media print {
  @page {
    size: 5in 7in;
    margin: 0 !important;
  }
  html, body {
    width: 5in !important;
    height: 7in !important;
    background: #fdf8f1 !important;
    padding: 0 !important;
    margin: 0 !important;
    display: block !important;
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
    color-adjust: exact !important;
  }
  .print-bar { display: none !important; }
  .card {
    width: 5in !important;
    height: 7in !important;
    aspect-ratio: unset !important;
    border-radius: 0 !important;
    box-shadow: none !important;
    position: fixed !important;
    top: 0 !important; left: 0 !important;
  }
  .card::before, .card::after { display: none !important; }
  .card-inner {
    margin: 0 !important;
    border: none !important;
    border-radius: 0 !important;
    height: 7in !important;
  }
  .card-top, .card-photo {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }
}

</style>
</head>
<body>

<div class="card">

  <!-- TOP: Content -->
  <div class="card-top">

    <p class="engaged-label">We're Engaged</p>

    <div class="names">
      <span class="name-word">Hammad</span>
      <span class="amp">&amp;</span>
      <span class="name-word">Nashra</span>
    </div>

    <p class="hamshra">Hamshra &nbsp;·&nbsp; 2026</p>

    <div class="divider">
      <div class="div-line"></div>
      <div class="div-diamond"></div>
      <div class="div-line r"></div>
    </div>

    <p class="tagline">
      Two hearts, one story —<br>
      six months in the making.
    </p>

    <div class="qr-wrap">
      <img
        src="https://raw.githubusercontent.com/muhammadhammadweb/hamshra-card/main/qr.png"
        alt="Scan to open our story"
      />
    </div>

    <p class="scan-label">Scan to open our story</p>

  </div>

  <!-- BOTTOM: Photo -->
  <div class="card-photo">
    <img
      src="https://raw.githubusercontent.com/muhammadhammadweb/hamshra-card/main/img3_river.png.png"
      alt="Hammad & Nashra"
    />
    <div class="year-pill">Engaged &nbsp;·&nbsp; March 2026</div>
  </div>

</div>

<button class="print-bar" onclick="window.print()">
  🖨 &nbsp; Save / Print Card
</button>

<script>
// Auto-set print settings instruction
window.addEventListener('beforeprint', function() {
  document.title = 'Hamshra_Card_5x7';
});
</script>

</body>
</html>
