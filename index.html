<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hammad & Nashra — Hamshra</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Nunito:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  :root {
    --cream: #fdf8f2;
    --blush: #e8c9b0;
    --sage: #8aad9f;
    --forest: #3d6b5e;
    --dust: #c4a882;
    --ink: #2c2416;
    --warm: #f5ede0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Nunito', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
  }

  /* ── Floating petals ── */
  .petals-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Opening screen ── */
  #opening {
    position: fixed;
    inset: 0;
    background: var(--cream);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 1.2s ease, visibility 1.2s ease;
  }
  #opening.hidden { opacity: 0; visibility: hidden; }

  .envelope {
    width: 120px;
    height: 80px;
    position: relative;
    cursor: pointer;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100%{ transform: translateY(0); }
    50%{ transform: translateY(-12px); }
  }

  .env-body {
    width: 120px; height: 80px;
    background: var(--warm);
    border: 2px solid var(--dust);
    border-radius: 4px;
    position: absolute;
    bottom: 0;
    box-shadow: 0 8px 30px rgba(0,0,0,0.08);
  }
  .env-flap {
    width: 0;
    height: 0;
    border-left: 60px solid transparent;
    border-right: 60px solid transparent;
    border-top: 46px solid var(--blush);
    position: absolute;
    top: 0;
    transition: transform 0.6s ease;
    transform-origin: top center;
  }
  .envelope:hover .env-flap { transform: rotateX(180deg); }

  .open-hint {
    margin-top: 28px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.2rem;
    color: var(--dust);
    letter-spacing: 0.05em;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.6;} 50%{opacity:1;} }

  /* ── Main page ── */
  #main {
    position: relative;
    z-index: 1;
    opacity: 0;
    transition: opacity 1.5s ease;
  }
  #main.visible { opacity: 1; }

  /* ── Hero ── */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 60px 24px;
    position: relative;
  }

  .names-container {
    position: relative;
    margin-bottom: 16px;
  }

  .names {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.5rem, 12vw, 8rem);
    font-weight: 300;
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--forest);
    opacity: 0;
    transform: translateY(30px);
    animation: riseUp 1.2s ease forwards 0.5s;
  }

  .amp {
    font-style: italic;
    color: var(--dust);
    font-size: 0.85em;
  }

  .combo-tag {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(1rem, 3vw, 1.5rem);
    color: var(--dust);
    letter-spacing: 0.15em;
    margin-top: 8px;
    opacity: 0;
    animation: riseUp 1.2s ease forwards 0.9s;
  }

  .hero-sub {
    font-size: clamp(0.85rem, 2vw, 1rem);
    color: var(--sage);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 24px;
    opacity: 0;
    animation: riseUp 1.2s ease forwards 1.3s;
  }

  .divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--dust), transparent);
    margin: 32px auto;
    opacity: 0;
    animation: riseUp 1s ease forwards 1.6s;
  }

  @keyframes riseUp {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Scroll indicator ── */
  .scroll-hint {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    color: var(--dust);
    text-transform: uppercase;
    animation: bounce 2s ease-in-out infinite;
    opacity: 0;
    animation: riseUp 1s ease forwards 2.2s, bounce 2s ease-in-out 3s infinite;
  }
  @keyframes bounce { 0%,100%{transform:translateX(-50%) translateY(0);} 50%{transform:translateX(-50%) translateY(6px);} }

  /* ── Sections ── */
  section {
    padding: 30px 24px;
    max-width: 720px;
    margin: 0 auto;
    position: relative;
  }

  .section-label {
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 20px;
    display: block;
  }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 300;
    color: var(--forest);
    margin-bottom: 32px;
    line-height: 1.2;
  }
  .section-title em { font-style: italic; color: var(--dust); }

  /* ── Timeline ── */
  .timeline {
    position: relative;
    padding-left: 32px;
  }
  .timeline::before {
    content: '';
    position: absolute;
    left: 6px; top: 8px; bottom: 8px;
    width: 1px;
    background: linear-gradient(to bottom, var(--blush), var(--sage), var(--blush));
  }

  .t-item {
    position: relative;
    margin-bottom: 40px;
    opacity: 0;
    transform: translateX(-20px);
    transition: all 0.8s ease;
  }
  .t-item.visible { opacity: 1; transform: translateX(0); }

  .t-dot {
    position: absolute;
    left: -29px;
    top: 6px;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--blush);
    border: 2px solid var(--dust);
  }

  .t-month {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 6px;
  }

  .t-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    line-height: 1.7;
    color: var(--ink);
    font-weight: 300;
  }
  .t-text em { font-style: italic; color: var(--forest); }

  /* ── Letter ── */
  .letter-box {
    background: var(--warm);
    border: 1px solid var(--blush);
    border-radius: 12px;
    padding: 48px 40px;
    position: relative;
    box-shadow: 0 4px 40px rgba(0,0,0,0.04);
  }
  .letter-box::before {
    content: '"';
    font-family: 'Cormorant Garamond', serif;
    font-size: 8rem;
    color: var(--blush);
    position: absolute;
    top: -20px; left: 20px;
    line-height: 1;
    opacity: 0.6;
  }

  #typewriter {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.05rem, 2.5vw, 1.25rem);
    line-height: 1.9;
    color: var(--ink);
    font-weight: 300;
    min-height: 200px;
  }

  .cursor {
    display: inline-block;
    width: 2px;
    height: 1.1em;
    background: var(--dust);
    vertical-align: text-bottom;
    animation: blink 0.9s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }

  .letter-sign {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.4rem;
    color: var(--forest);
    text-align: right;
    margin-top: 32px;
  }

  /* ── Promise ── */
  .promise-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 8px;
  }
  @media(max-width:500px){ .promise-grid { grid-template-columns: 1fr; } }

  .p-card {
    background: var(--warm);
    border: 1px solid var(--blush);
    border-radius: 10px;
    padding: 24px 20px;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.7s ease;
  }
  .p-card.visible { opacity: 1; transform: translateY(0); }

  .p-icon { font-size: 1.5rem; margin-bottom: 10px; }
  .p-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    line-height: 1.6;
    color: var(--ink);
  }

  /* ── Final ── */
  .final-section {
    text-align: center;
    padding: 100px 24px;
    background: linear-gradient(to bottom, var(--cream), var(--warm));
  }

  .hamra {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(4rem, 15vw, 10rem);
    font-weight: 300;
    font-style: italic;
    color: var(--forest);
    line-height: 1;
    opacity: 0;
    transform: scale(0.8);
    transition: all 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .hamra.visible { opacity: 1; transform: scale(1); }

  .final-line {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1rem, 3vw, 1.4rem);
    font-style: italic;
    color: var(--dust);
    margin-top: 16px;
    opacity: 0;
    transition: opacity 1s ease 0.6s;
  }
  .final-line.visible { opacity: 1; }

  .engagement-badge {
    display: inline-block;
    margin-top: 40px;
    padding: 14px 36px;
    border: 1px solid var(--dust);
    border-radius: 100px;
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--forest);
    opacity: 0;
    transition: opacity 1s ease 1s;
  }
  .engagement-badge.visible { opacity: 1; }


  /* Gallery */
  .gallery-section {
    padding: 24px 24px 80px;
    max-width: 800px;
    margin: 0 auto;
  }
  .gallery-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 16px;
    margin-top: 32px;
  }
  .gallery-item {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.08);
    opacity: 0;
    transform: translateY(24px);
    transition: all 0.8s ease;
  }
  .gallery-item.visible { opacity: 1; transform: translateY(0); }
  .gallery-item:first-child {
    grid-column: 1 / -1;
  }
  .gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  /* White fade edges on sides */
  .gallery-item::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(253,248,242,0) 60%,
      rgba(253,248,242,0.6) 100%
    );
    z-index: 1;
    pointer-events: none;
    border-radius: 16px;
  }
  .gallery-caption {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.95rem;
    color: var(--ink);
    white-space: nowrap;
    background: rgba(253,248,242,0.75);
    padding: 4px 14px;
    border-radius: 20px;
    backdrop-filter: blur(4px);
  }
  @media(max-width:500px){
    .gallery-grid { grid-template-columns: 1fr; }
    .gallery-item:first-child { grid-column: 1; }
  }

  /* ── Music toggle ── */
  #music-btn {
    position: fixed;
    bottom: 24px; right: 24px;
    z-index: 200;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--warm);
    border: 1px solid var(--blush);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    transition: transform 0.2s;
  }
  #music-btn:hover { transform: scale(1.1); }

  /* ── Gallery ── */
  .gallery-section {
    padding: 80px 24px 40px;
    max-width: 900px;
    margin: 0 auto;
  }

  .gallery-hero {
    width: 100%;
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.12);
    opacity: 0;
    transform: translateY(30px);
    transition: all 1s ease;
  }
  .gallery-hero.visible { opacity: 1; transform: translateY(0); }
  .gallery-hero img { width: 100%; display: block; }

  .gallery-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }
  @media(max-width:500px){ .gallery-grid { grid-template-columns: 1fr; } }

  .gallery-item {
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 30px rgba(0,0,0,0.10);
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.8s ease;
  }
  .gallery-item.visible { opacity: 1; transform: translateY(0); }
  .gallery-item img {
    width: 100%;
    display: block;
    transition: transform 0.4s ease;
  }
  .gallery-item:hover img { transform: scale(1.03); }

  .gallery-caption {
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1rem;
    color: var(--dust);
    margin-top: 20px;
    letter-spacing: 0.08em;
  }

</style>
</head>

<script>
// ── Petals ──
const canvas = document.getElementById('petals');
const ctx = canvas.getContext('2d');
let W, H, petals = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function Petal() {
  this.reset = function() {
    this.x = Math.random() * W;
    this.y = -20;
    this.size = 4 + Math.random() * 8;
    this.speed = 0.4 + Math.random() * 0.8;
    this.wind = (Math.random() - 0.5) * 0.5;
    this.rot = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.02;
    this.alpha = 0.3 + Math.random() * 0.4;
    this.color = Math.random() > 0.5 ? '#e8c9b0' : '#8aad9f';
  };
  this.reset();
  this.y = Math.random() * H;
}

for (let i = 0; i < 35; i++) petals.push(new Petal());

function drawPetal(p) {
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.rot);
  ctx.globalAlpha = p.alpha;
  ctx.fillStyle = p.color;
  ctx.beginPath();
  ctx.ellipse(0, 0, p.size, p.size * 0.5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function animatePetals() {
  ctx.clearRect(0, 0, W, H);
  petals.forEach(p => {
    p.y += p.speed;
    p.x += p.wind;
    p.rot += p.rotSpeed;
    if (p.y > H + 20) p.reset();
    drawPetal(p);
  });
  requestAnimationFrame(animatePetals);
}
animatePetals();

// ── Music & Opening Logic ──
const opening = document.getElementById('opening');
const main = document.getElementById('main');
const envBtn = document.getElementById('env-btn');
const audio = document.getElementById('bg-music');
const musicBtn = document.getElementById('music-btn');
let playing = false; 

envBtn.addEventListener('click', () => {
  opening.classList.add('hidden');
  main.classList.add('visible');
  
  audio.currentTime = 6;
  
  audio.play().then(() => {
     playing = true;
     musicBtn.textContent = '🔇';
  }).catch((err) => {
     console.log("Playback blocked:", err);
  });
});

musicBtn.addEventListener('click', () => {
  if (playing) { 
    audio.pause(); 
    musicBtn.textContent = '🎵'; 
    playing = false; 
  } else { 
    audio.play(); 
    musicBtn.textContent = '🔇'; 
    playing = true; 
  }
});

// ── Intersection Observer ──
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add('visible');
    }
  });
}, { threshold: 0.2 });

document.querySelectorAll('.gallery-item').forEach(el => observer.observe(el));
